# FAMCO — App Build & Deploy Pipeline
# Triggers on push to main (→ prod) or dev branch (→ dev).
# Builds Docker image, pushes to ACR, deploys to Container Apps.
#
# Variable Groups required (ADO → Pipelines → Library):
#
#   "famco-dev-secrets"  and  "famco-prod-secrets"
#   Each group needs (mark secrets with 🔒):
#
#     AZURE_SUBSCRIPTION_ID            — Azure subscription ID
#     RESOURCE_GROUP                   — e.g. famco-dev-rg
#     ACR_LOGIN_SERVER         🔒      — from infra output (e.g. famcodevXXX.azurecr.io)
#     ACR_NAME                         — ACR resource name
#     CONTAINER_APP_NAME               — e.g. famco-dev-app
#     NEXTAUTH_URL                     — Front Door URL from infra output
#     AUTH_SECRET              🔒      — openssl rand -base64 32
#     GOOGLE_CLIENT_ID                 — from Google Cloud Console
#     GOOGLE_CLIENT_SECRET     🔒
#     DATABASE_URL             🔒      — postgresql://famcoadmin:PASS@host:5432/famco?sslmode=require
#     AZURE_STORAGE_CONNECTION_STRING 🔒
#     REDIS_URL                🔒      — rediss://:{key}@host:6380
#     APPLE_ID                         — (optional, for future iOS)
#     APPLE_SECRET             🔒      — (optional)
#     APPLE_TEAM_ID                    — (optional)
#     APPLE_KEY_ID                     — (optional)
#     APPLE_PRIVATE_KEY        🔒      — (optional)

trigger:
  branches:
    include:
      - main   # → prod
      - dev    # → dev

variables:
  ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
    targetEnv: prod
  ${{ else }}:
    targetEnv: dev
  imageRepository: famco
  tag: $(Build.BuildId)

stages:

  # ── Stage 1: Build & push Docker image to ACR ───────────────────────────────
  - stage: Build
    displayName: Build & Push Image
    variables:
      - group: famco-$(targetEnv)-secrets
    jobs:
      - job: BuildAndPush
        displayName: Docker build → ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Log in to ACR
            inputs:
              azureSubscription: famco-azure-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - task: Docker@2
            displayName: Build and push $(imageRepository):$(tag)
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: Dockerfile
              containerRegistry: famco-azure-connection
              tags: |
                $(tag)
                latest

  # ── Stage 2: Deploy to Azure Container Apps ──────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Container Apps ($(targetEnv))
    dependsOn: Build
    variables:
      - group: famco-$(targetEnv)-secrets
    jobs:
      - deployment: DeployApp
        displayName: Deploy container
        pool:
          vmImage: ubuntu-latest
        environment: $(targetEnv)
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureCLI@2
                  displayName: Set Container App secrets
                  inputs:
                    azureSubscription: famco-azure-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp secret set \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --secrets \
                          "auth-secret=$(AUTH_SECRET)" \
                          "google-client-secret=$(GOOGLE_CLIENT_SECRET)" \
                          "database-url=$(DATABASE_URL)" \
                          "storage-conn=$(AZURE_STORAGE_CONNECTION_STRING)" \
                          "redis-url=$(REDIS_URL)" \
                          "apple-secret=$(APPLE_SECRET)" \
                          "apple-private-key=$(APPLE_PRIVATE_KEY)"

                - task: AzureCLI@2
                  displayName: Deploy $(imageRepository):$(tag) to Container App
                  inputs:
                    azureSubscription: famco-azure-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(ACR_LOGIN_SERVER)/$(imageRepository):$(tag) \
                        --set-env-vars \
                          "NEXTAUTH_URL=$(NEXTAUTH_URL)" \
                          "AUTH_SECRET=secretref:auth-secret" \
                          "GOOGLE_CLIENT_ID=$(GOOGLE_CLIENT_ID)" \
                          "GOOGLE_CLIENT_SECRET=secretref:google-client-secret" \
                          "DATABASE_URL=secretref:database-url" \
                          "AZURE_STORAGE_CONNECTION_STRING=secretref:storage-conn" \
                          "AZURE_STORAGE_CONTAINER_NAME=calendars" \
                          "REDIS_URL=secretref:redis-url" \
                          "APPLE_ID=$(APPLE_ID)" \
                          "APPLE_SECRET=secretref:apple-secret" \
                          "APPLE_TEAM_ID=$(APPLE_TEAM_ID)" \
                          "APPLE_KEY_ID=$(APPLE_KEY_ID)" \
                          "APPLE_PRIVATE_KEY=secretref:apple-private-key"

                - task: AzureCLI@2
                  displayName: Verify deployment
                  inputs:
                    azureSubscription: famco-azure-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp show \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --query "properties.latestRevisionName" -o tsv
